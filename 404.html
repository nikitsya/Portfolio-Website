<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Redirecting</title>
    <link href="favicon.svg" rel="icon" type="image/svg+xml"/>
    <link href="favicon.svg" rel="apple-touch-icon"/>
    <script>
        (function () {
            const segments = window.location.pathname.split("/").filter(Boolean);
            const isGitHubProjectSite = window.location.hostname.endsWith("github.io");
            const target = isGitHubProjectSite && segments.length > 0 ? `/${segments[0]}/` : "/";
            window.location.replace(target);
        })();
    </script>
    <noscript>
        <meta content="0; url=/" http-equiv="refresh"/>
    </noscript>
</head>
<body></body>
</html>
